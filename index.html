<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Calendar Task Pro</title>

<link rel="icon" href="https://png.pngtree.com/png-clipart/20240629/original/pngtree-google-calendar-calendar-icon-vector-png-image_15443322.png" type="image/png">
<link rel="apple-touch-icon" href="https://png.pngtree.com/png-clipart/20240629/original/pngtree-google-calendar-calendar-icon-vector-png-image_15443322.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
  /* Variabili per Tema Chiaro e Scuro */
  :root {
    --primary: #7C3AED; 
    --bg: #F3F4F6; 
    --card-bg: #ffffff;
    --text-main: #374151; 
    --border-color: #D1D5DB; 
    --grid-border: #6B7280; 
    --modal-bg: #ffffff;
    --toolbar-bg: rgba(255, 255, 255, 0.85);
    --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    --radius: 20px;
    --header-bg: #ffffff;
    --empty-bg: #F3F4F6;
    --weekend-bg: #F9FAFB;
    --weekend-text: #111827;
    --default-cell-bg: #ffffff;
    --default-text: #111827;
  }

  body.dark-mode {
    --primary: #8B5CF6; 
    --bg: #111827;
    --card-bg: #1F2937;
    --text-main: #E5E7EB;
    --border-color: #4B5563; 
    --grid-border: #4B5563; 
    --modal-bg: #1F2937;
    --toolbar-bg: rgba(31, 41, 55, 0.85);
    --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
    --header-bg: #000000; 
    --empty-bg: #000000; 
    --weekend-bg: #000000; 
    --weekend-text: #ffffff; 
    --default-cell-bg: #ffffff; 
    --default-text: #111827; 
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
  body { background: var(--bg); color: var(--text-main); padding: 1rem; padding-top: 80px; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }

  /* Login Screen */
  #loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .login-card { background: var(--card-bg); padding: 40px 30px; border-radius: 24px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-color); }
  .login-card h2 { margin-bottom: 8px; color: var(--primary); font-weight: 700; }
  .login-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg); color: var(--text-main); font-size: 15px; outline: none; }
  .login-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--primary); color: white; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }

  #appContent { display: none; }

  /* Toolbar Desktop */
  .toolbar { position: fixed; top: 0; left: 0; right: 0; background: var(--toolbar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; padding: 12px; z-index: 100; border-bottom: 1px solid var(--border-color); }
  select, button { height: 38px; padding: 0 16px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s ease; }
  button:active { transform: scale(0.96); }
  button.undo-btn { background: #F59E0B; color: white; border: none; font-weight: 600; }
  button.today-btn { background: var(--primary); color: white; border: none; font-weight: 600; }
  button.dark-btn { background: #374151; color: white; border: none; font-weight: 600; }
  button.logout-btn { background: #E74C3C; color: white; border: none; font-weight: 600; }
  body.dark-mode button.dark-btn { background: #F3F4F6; color: #111827; }

  /* Grid e Cards Desktop */
  .cal-grid { display: flex; flex-direction: column; gap: 35px; align-items: center; margin-top: 10px; }
  .month-block { background: var(--default-cell-bg); width: 100%; max-width: 900px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); scroll-margin-top: 100px; border: 1px solid var(--grid-border); }
  .month-header { padding: 16px; font-size: 18px; font-weight: 600; text-align: center; color: var(--primary); background: var(--header-bg); border-bottom: 1px solid var(--grid-border); transition: background 0.3s; }
  .days-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--primary); border-bottom: 1px solid var(--grid-border); }
  .day-name { text-align: center; font-size: 11px; font-weight: 600; color: white; padding: 10px 0; text-transform: uppercase; letter-spacing: 0.5px; }

  .week-row, .note-row { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cell { border-right: 1px solid var(--grid-border); cursor: pointer; overflow: hidden; transition: filter 0.2s; }
  .cell:hover { filter: brightness(0.95); }
  .week-row .cell:last-child, .note-row .cell:last-child { border-right: none; }
  .cell.empty { background: var(--empty-bg) !important; cursor: default; transition: background 0.3s; }

  /* Giorno e Note Desktop */
  .day-cell { height: 38px; border-bottom: 1px solid var(--grid-border); display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
  .day-num { font-weight: 600; font-size: 17px; } 
  .note-cell { height: 100px; border-bottom: 1px solid var(--grid-border); font-size: 11px; font-weight: 500; text-align: left; padding: 6px; display: block; line-height: 1.4; transition: background 0.3s; overflow-y: auto; }
  
  /* Scrollbar e Ring */
  .note-cell::-webkit-scrollbar { width: 4px; }
  .note-cell::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }
  body.dark-mode .note-cell::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); }
  
  .today-ring { position: relative; }
  .today-ring::after { content: ''; position: absolute; inset: -2px; border: 4px solid var(--primary); border-radius: 6px; pointer-events: none; z-index: 10; }
  .cell.selected { position: relative; }
  .cell.selected::after { content: ''; position: absolute; inset: 0; background-color: rgba(124, 58, 237, 0.2); border: 2px solid var(--primary); pointer-events: none; z-index: 5; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; visibility: hidden; transition: all 0.2s ease; }
  .modal-bg.active { opacity: 1; visibility: visible; }
  .modal { background: var(--modal-bg); border-radius: 24px; padding: 24px; width: 350px; max-width: 90vw; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transform: translateY(20px); transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--border-color); }
  .modal-bg.active .modal { transform: translateY(0); }
  textarea { width: 100%; height: 120px; margin: 15px 0; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); resize: none; font-size: 14px; font-weight: 500; background: var(--bg); color: var(--text-main); outline: none; }
  .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .color-opt { height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; font-weight: 600; border: 1px solid var(--border-color); transition: transform 0.1s; }
  .btn-save { width: 100%; background: #10B981; color: white; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }


  /* 📱 OTTIMIZZAZIONI MOBILE ESTREME (FIT-TO-SCREEN) */
  @media (max-width: 600px) {
    body { padding: 4px; padding-top: 60px; }
    
    /* Toolbar super compatta */
    .toolbar { padding: 6px; gap: 4px; }
    select, button { height: 32px; padding: 0 8px; font-size: 11px; }
    #syncStatus { font-size: 9px !important; margin-left: 2px !important; }

    .cal-grid { gap: 20px; margin-top: 5px; }

    /* Il Mese occupa ESATTAMENTE l'altezza dello schermo (100dvh - altezza menu) */
    .month-block { 
      height: calc(100dvh - 75px); 
      display: flex; 
      flex-direction: column; 
      scroll-margin-top: 65px; 
      border-radius: 12px;
    }
    
    .month-header { padding: 8px; font-size: 15px; }
    .days-header .day-name { padding: 5px 0; font-size: 9px; }

    /* Magia Flexbox: La riga dei numeri ha un'altezza fissa piccola... */
    .week-row { flex: 0 0 24px; }
    /* ...mentre la riga degli appunti si STIRA (flex: 1) per riempire esattamente tutto lo spazio rimasto! */
    .note-row { flex: 1 1 0; min-height: 0; }

    .day-cell { height: 100%; }
    .day-num { font-size: 13px; }

    .note-cell { height: 100%; font-size: 9px; padding: 3px 2px; }
    .note-cell div { margin-bottom: 1px; } /* Task ancora più ravvicinati */
    
    .today-ring::after { inset: -1px; border-width: 2px; } /* Bordo oggi proporzionato */
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h2>Smart Calendar</h2>
    <input type="email" id="emailInput" class="login-input" placeholder="Email">
    <input type="password" id="passwordInput" class="login-input" placeholder="Password">
    <button class="login-btn" onclick="login()">Entra</button>
    <div id="loginError" style="color:#E74C3C; margin-top:10px; font-size:12px;"></div>
  </div>
</div>

<div id="appContent">
  <div class="toolbar">
    <select id="yearSel"></select>
    <button class="today-btn" onclick="scrollToToday()">📅 Oggi</button>
    <button class="dark-btn" onclick="toggleDarkMode()">🌓 Tema</button>
    <button id="undoBtn" class="undo-btn" onclick="undo()">↩ Annulla</button>
    <button class="logout-btn" onclick="logout()">Esci</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>

  <div class="modal-bg" id="modal" onclick="if(event.target.id==='modal')cancelModal()">
    <div class="modal">
      <h4 id="modalTitle" style="text-align:center; margin-bottom:10px;">Modifica</h4>
      <div class="color-grid" id="colorGrid"></div>
      <textarea id="modalText" placeholder="Scrivi qui i tuoi task..."></textarea>
      <button class="btn-save" onclick="saveAndCloseModal()">FATTO</button>
    </div>
  </div>
</div>

<script>
// --- TEMA SCURO ---
if (localStorage.getItem('darkMode') === 'true') { document.body.classList.add('dark-mode'); }
function toggleDarkMode() { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); }

// --- CONFIGURAZIONE FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDeFEGyaHbvTB5GmQwvZ3LCRHEXliWPlE8",
  authDomain: "calendariosmart-4ae27.firebaseapp.com",
  projectId: "calendariosmart-4ae27",
  storageBucket: "calendariosmart-4ae27.firebasestorage.app",
  messagingSenderId: "1027818141525",
  appId: "1:1027818141525:web:b409cbe6c524d532a1a1dc",
  databaseURL: "https://calendariosmart-4ae27-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();
let dbRef = null, db = {}, historyStack = [], initialLoad = true, currentYear = new Date().getFullYear();
let selectedKeys = [], tempBulkColor = null, tempBulkText = "";

// --- GESTIONE AUTENTICAZIONE ---
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    if(!dbRef) {
      dbRef = database.ref('calendario_dati');
      dbRef.on('value', (s) => {
        db = s.val() || {};
        render();
        if (initialLoad) { setTimeout(scrollToToday, 200); initialLoad = false; setupPointerEvents(); }
      });
    }
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appContent').style.display = 'none';
  }
});

function login() { auth.signInWithEmailAndPassword(document.getElementById('emailInput').value, document.getElementById('passwordInput').value).catch(e => document.getElementById('loginError').textContent = "Credenziali errate"); }
function logout() { auth.signOut(); initialLoad = true; }

// --- COLORI E MENU ---
const COLORS = [
  {id:'none', label:'Vuoto', hex:'none', autoText: '', isAdd: false},
  {id:'mattina', label:'Mattina', hex:'#D6EAF8', autoText: 'Mattina', isAdd: false},
  {id:'pomeriggio', label:'Pom.', hex:'#F5CBA7', autoText: 'Pomeriggio', isAdd: false}, 
  {id:'smart', label:'Smart', hex:'#E74C3C', autoText: 'Smart', isAdd: false},
  {id:'ferie', label:'Ferie', hex:'#566573', autoText: 'Ferie', isAdd: false},
  {id:'treno1', label:'🚂 8.52', hex:'none', autoText: '🚂 8.52', isAdd: true},
  {id:'treno2', label:'🚂 15.05', hex:'none', autoText: '🚂 15.05', isAdd: true},
  {id:'corso', label:'Corso', hex:'#3498DB', autoText: 'Corso', isAdd: true},
  {id:'allatto', label:'Allatto', hex:'#9B59B6', autoText: '🟣 Allatto', isAdd: true},
  {id:'festivita', label:'Festività', hex:'#A7F3D0', autoText: '', isAdd: false}
];
const darkBgColors = ['#E74C3C', '#566573', '#3498DB', '#9B59B6'];

function saveState() { historyStack.push(JSON.stringify(db)); if(historyStack.length > 30) historyStack.shift(); }
function pushToCloud() { if(auth.currentUser) dbRef.set(db); }
function undo() { if(historyStack.length > 0) { db = JSON.parse(historyStack.pop()); pushToCloud(); render(); } }
window.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); } });

// --- RENDERING CALENDARIO ---
function render() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const today = new Date();
  const ty = today.getFullYear(), tm = today.getMonth(), td = today.getDate();

  for(let m=1; m<=12; m++) {
    const daysInM = new Date(currentYear, m, 0).getDate();
    const offset = new Date(currentYear, m-1, 1).getDay() === 0 ? 6 : new Date(currentYear, m-1, 1).getDay() - 1;
    let h = `<div class="month-block" id="m-${currentYear}-${m}"><div class="month-header">${['GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO','LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'][m-1]} ${currentYear}</div><div class="days-header">${['LUN','MAR','MER','GIO','VEN','SAB','DOM'].map(d => `<div class="day-name">${d}</div>`).join('')}</div>`;
    
    let d = 1 - offset;
    while(d <= daysInM) {
      h += `<div class="week-row">`;
      for(let i=0; i<7; i++) {
        let cd = d + i;
        if(cd > 0 && cd <= daysInM) {
          const k = `${currentYear}-${m}-${cd}-top`, isT = currentYear===ty && (m-1)===tm && cd===td, user = db[k] || {};
          let bg = user.color && user.color!=='none' ? COLORS.find(c=>c.id===user.color).hex : (new Date(currentYear, m-1, cd).getDay()%6===0 && new Date(currentYear, m-1, cd).getDay()!==0 || new Date(currentYear, m-1, cd).getDay()===0 ? 'var(--weekend-bg)' : (Math.round((new Date(currentYear, m-1, cd) - new Date(2027,0,4))/(7*24*3600000))%2===0 ? '#D6EAF8' : '#F5CBA7'));
          h += `<div class="cell day-cell ${isT?'today-ring':''}" style="background:${bg}" data-key="${k}"><span class="day-num">${cd}</span></div>`;
        } else h += `<div class="cell empty"></div>`;
      }
      h += `</div><div class="note-row">`;
      for(let i=0; i<7; i++) {
        let cd = d + i;
        if(cd > 0 && cd <= daysInM) {
          const k = `${currentYear}-${m}-${cd}-bottom`, user = db[k] || {};
          let bg = user.color && user.color!=='none' ? COLORS.find(c=>c.id===user.color).hex : (new Date(currentYear, m-1, cd).getDay()%6===0 && new Date(currentYear, m-1, cd).getDay()!==0 || new Date(currentYear, m-1, cd).getDay()===0 ? 'var(--weekend-bg)' : 'var(--default-cell-bg)');
          const tasks = (user.text||'').split('\n').filter(l=>l.trim()).map(l=>`<div style="display:flex;gap:4px"><span>•</span><span style="flex:1;word-break:break-word;">${l}</span></div>`).join('');
          h += `<div class="cell note-cell" style="background:${bg}; color:${darkBgColors.includes(bg)?'#fff':'var(--text-main)'}" data-key="${k}">${tasks}</div>`;
        } else h += `<div class="cell empty"></div>`;
      }
      h += `</div>`; d += 7;
    }
    grid.innerHTML += h + `</div>`;
  }
}

// --- LOGICA MODAL E SELEZIONE ---
function setupPointerEvents() {
  const grid = document.getElementById('calGrid');
  grid.onpointerdown = (e) => { const cell = e.target.closest('.cell:not(.empty)'); if (!cell) return; isSelecting = true; selectedKeys = [cell.dataset.key]; cell.classList.add('selected'); grid.setPointerCapture(e.pointerId); };
  grid.onpointermove = (e) => { if (!isSelecting) return; const cell = document.elementFromPoint(e.clientX, e.clientY)?.closest('.cell:not(.empty)'); if (cell && !selectedKeys.includes(cell.dataset.key)) { selectedKeys.push(cell.dataset.key); cell.classList.add('selected'); } };
  grid.onpointerup = (e) => { if (isSelecting) { isSelecting = false; grid.releasePointerCapture(e.pointerId); openBulkEdit(); } };
}

function openBulkEdit() {
  const data = (selectedKeys.length === 1) ? (db[selectedKeys[0]] || {}) : {};
  tempBulkColor = data.color || 'none'; tempBulkText = data.text || "";
  document.getElementById('modalText').value = tempBulkText;
  renderColors(); document.getElementById('modal').classList.add('active');
}

function renderColors() {
  document.getElementById('colorGrid').innerHTML = COLORS.map(c => {
    let textCol = c.hex === 'none' ? 'var(--text-main)' : (darkBgColors.includes(c.hex) ? '#ffffff' : '#111827');
    return `<div class="color-opt" style="background:${c.hex==='none'?'var(--card-bg)':c.hex}; border:${tempBulkColor===c.id?'2px solid var(--primary)':'1px solid var(--border-color)'}; color:${textCol}" onclick="selectBulkColor('${c.id}')">${c.label}</div>`;
  }).join('');
}

function selectBulkColor(id) {
  const colorObj = COLORS.find(c => c.id === id);
  if (!colorObj.isAdd) tempBulkColor = id;
  if (id === 'none') { tempBulkText = ''; }
  else if (colorObj.autoText) {
    if (tempBulkText && !tempBulkText.endsWith('\n')) tempBulkText += '\n';
    tempBulkText += colorObj.autoText + '\n';
  }
  document.getElementById('modalText').value = tempBulkText; renderColors(); document.getElementById('modalText').focus();
}

function saveAndCloseModal() {
  historyStack.push(JSON.stringify(db));
  selectedKeys.forEach(k => {
    db[k] = { color: tempBulkColor, text: document.getElementById('modalText').value.trim() };
    if(!db[k].text && db[k].color === 'none') delete db[k];
  });
  dbRef.set(db);
  document.getElementById('modal').classList.remove('active'); document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected'));
}

function cancelModal() { document.getElementById('modal').classList.remove('active'); document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected')); }

function scrollToToday() {
  const target = document.getElementById(`m-${currentYear}-${new Date().getMonth()+1}`);
  if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
}

const s = document.getElementById('yearSel');
for(let y=2024; y<=2080; y++) { let o=document.createElement('option'); o.value=y; o.textContent=y; s.appendChild(o); }
s.value = currentYear; s.onchange = () => { currentYear = +s.value; render(); };
</script>
</body>
</html>
