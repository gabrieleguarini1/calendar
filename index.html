<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Smart Calendar Premium</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="https://png.pngtree.com/png-clipart/20240629/original/pngtree-google-calendar-calendar-icon-vector-png-image_15443322.png" type="image/png">
<link rel="apple-touch-icon" href="https://png.pngtree.com/png-clipart/20240629/original/pngtree-google-calendar-calendar-icon-vector-png-image_15443322.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
  :root {
    --primary: #7C3AED; --bg: #F3F4F6; --card-bg: #ffffff; --text-main: #374151; 
    --border-color: #D1D5DB; --grid-border: #6B7280; --modal-bg: #ffffff;
    --toolbar-bg: rgba(255, 255, 255, 0.85); --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    --radius: 20px; --header-bg: #ffffff; --empty-bg: #F3F4F6; --weekend-bg: #F9FAFB;
    --weekend-text: #111827; --default-cell-bg: #ffffff; --default-text: #111827;
  }

  body.dark-mode {
    --primary: #8B5CF6; --bg: #111827; --card-bg: #1F2937; --text-main: #E5E7EB;
    --border-color: #4B5563; --grid-border: #4B5563; --modal-bg: #1F2937;
    --toolbar-bg: rgba(31, 41, 55, 0.85); --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
    --header-bg: #000000; --empty-bg: #000000; --weekend-bg: #000000; --weekend-text: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
  body { background: var(--bg); color: var(--text-main); padding: 1rem; padding-top: 80px; -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }

  #loginScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .login-card { background: var(--card-bg); padding: 40px 30px; border-radius: 24px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border-color); }
  .login-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg); color: var(--text-main); outline: none; }
  .login-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }

  #appContent { display: none; }

  .toolbar { position: fixed; top: 0; left: 0; right: 0; background: var(--toolbar-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; padding: 12px; z-index: 100; border-bottom: 1px solid var(--border-color); }
  select, button { height: 38px; padding: 0 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); cursor: pointer; font-size: 13px; font-weight: 600; }
  
  .cal-grid { display: flex; flex-direction: column; gap: 35px; align-items: center; margin-top: 10px; }
  .month-block { background: var(--default-cell-bg); width: 100%; max-width: 900px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--grid-border); scroll-margin-top: 80px; }
  .month-header { padding: 16px; font-size: 18px; font-weight: 600; text-align: center; color: var(--primary); background: var(--header-bg); border-bottom: 1px solid var(--grid-border); }
  .days-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--primary); border-bottom: 1px solid var(--grid-border); }
  .day-name { text-align: center; font-size: 11px; font-weight: 600; color: white; padding: 10px 0; text-transform: uppercase; }

  .week-row, .note-row { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cell { border-right: 1px solid var(--grid-border); cursor: pointer; overflow: hidden; position: relative; }
  .cell.empty { background: var(--empty-bg) !important; cursor: default; }
  .day-cell { height: 38px; border-bottom: 1px solid var(--grid-border); display: flex; align-items: center; justify-content: center; }
  .note-cell { height: 95px; border-bottom: 1px solid var(--grid-border); font-size: 11px; padding: 6px; overflow-y: auto; }
  
  .today-ring::after { content: ''; position: absolute; inset: -1px; border: 3px solid var(--primary); border-radius: 4px; pointer-events: none; z-index: 10; }
  .cell.selected::after { content: ''; position: absolute; inset: 0; background-color: rgba(124, 58, 237, 0.2); border: 2px solid var(--primary); z-index: 5; }

  /* Modals */
  .modal-bg { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 500; opacity: 0; visibility: hidden; }
  .modal-bg.active { opacity: 1; visibility: visible; }
  .modal { background: var(--modal-bg); border-radius: 24px; padding: 24px; width: 380px; max-width: 90vw; box-shadow: var(--shadow); border: 1px solid var(--border-color); }
  textarea { width: 100%; height: 90px; margin: 15px 0; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg); color: var(--text-main); resize: none; }
  .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .color-opt { height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; border: 1px solid var(--border-color); }
  .btn-save { width: 100%; background: var(--primary); color: white; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  @media (max-width: 600px) {
    body { padding: 4px; padding-top: 60px; }
    .toolbar { padding: 6px; gap: 4px; }
    select, button { height: 32px; padding: 0 8px; font-size: 11px; }
    .month-block { height: calc(100dvh - 70px); display: flex; flex-direction: column; }
    .week-row { flex: 0 0 26px; }
    .note-row { flex: 1 1 0; }
  }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <h2>Smart Calendar</h2>
    <p>Area riservata. Effettua l'accesso.</p>
    <input type="email" id="emailInput" class="login-input" placeholder="Email">
    <input type="password" id="passwordInput" class="login-input" placeholder="Password">
    <button class="login-btn" onclick="login()">Entra</button>
  </div>
</div>

<div id="appContent">
  <div class="toolbar" id="mainToolbar">
    <select id="yearSel"></select>
    <button onclick="scrollToToday()">📍 Oggi</button>
    <button onclick="showStats()" style="background: var(--primary); color: white;">📊 Riepilogo</button>
    <button onclick="location.reload()">UPLD</button>
    <button onclick="undo()">UNDO</button>
    <button onclick="logout()">Esci</button>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="modal-bg" id="statsOverlay" onclick="if(event.target.id==='statsOverlay') this.classList.remove('active')">
    <div class="modal">
      <h4 style="text-align:center; margin-bottom:15px; color:var(--primary); font-size: 18px;">📊 Riepilogo & Strumenti</h4>
      
      <div id="statsContent" style="line-height:1.9; font-size:14px; font-weight:500; margin-bottom: 20px; background: var(--bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color);"></div>
      
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px;">
          <button class="btn-save" style="margin-top:0; background: #25D366; font-size: 11px;" onclick="shareWeek()">📤 Invia</button>
          <button class="btn-save" style="margin-top:0; background: #3498DB; font-size: 11px;" onclick="showWeather()">🌦️ Meteo</button>
          <button class="btn-save" style="margin-top:0; background: #374151; font-size: 11px;" onclick="toggleDarkMode()">🌓 Tema</button>
      </div>

      <button class="btn-save" style="background: #E74C3C;" onclick="document.getElementById('statsOverlay').classList.remove('active')">CHIUDI</button>
    </div>
  </div>

  <div class="modal-bg" id="weatherOverlay" onclick="if(event.target.id==='weatherOverlay') this.classList.remove('active')">
    <div class="modal">
      <h4 style="text-align:center; margin-bottom:15px; color:var(--primary); font-size: 18px;">🌦️ Meteo Locale</h4>
      <div id="weatherContent" style="line-height:1.6; font-size:14px; text-align:left; margin-bottom: 20px;">
         <em>📍 Acquisizione posizione in corso...</em>
      </div>
      <button class="btn-save" onclick="document.getElementById('weatherOverlay').classList.remove('active')">CHIUDI METEO</button>
    </div>
  </div>

  <div class="modal-bg" id="modal" onclick="if(event.target.id==='modal')cancelModal()">
    <div class="modal">
      <h4 style="text-align:center; margin-bottom:12px;">Modifica Giorno</h4>
      <div class="color-grid" id="colorGrid"></div>
      <textarea id="modalText" placeholder="Aggiungi task..."></textarea>
      <button class="btn-save" onclick="saveAndCloseModal()">FATTO</button>
    </div>
  </div>
</div>

<script>
// Gestione Dark Mode
if (localStorage.getItem('darkMode') === 'true') { document.body.classList.add('dark-mode'); }
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
}

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDeFEGyaHbvTB5GmQwvZ3LCRHEXliWPlE8",
  authDomain: "calendariosmart-4ae27.firebaseapp.com",
  projectId: "calendariosmart-4ae27",
  databaseURL: "https://calendariosmart-4ae27-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const database = firebase.database();
let dbRef = null; let initialLoad = true; let db = {};

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';
    if(!dbRef) {
        dbRef = database.ref('calendario_dati');
        dbRef.on('value', (s) => {
          db = s.val() || {}; render();
          if (initialLoad) { setTimeout(scrollToToday, 300); initialLoad = false; setupPointerEvents(); }
        });
    }
  } else { document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('appContent').style.display = 'none'; }
});

function login() {
  const email = document.getElementById('emailInput').value;
  const pass = document.getElementById('passwordInput').value;
  auth.signInWithEmailAndPassword(email, pass).catch(e => alert('Accesso negato'));
}
function logout() { auth.signOut(); initialLoad = true; }

const COLORS = [
  {id:'none', label:'Vuoto', hex:'none', autoText: '', isAdd: false},
  {id:'mattina', label:'Mattina', hex:'#D6EAF8', autoText: '', isAdd: false},
  {id:'pomeriggio', label:'Pom.', hex:'#F5CBA7', autoText: '', isAdd: false},
  {id:'smart', label:'Smart', hex:'#E74C3C', autoText: '', isAdd: false},
  {id:'ferie', label:'Ferie', hex:'#566573', autoText: '', isAdd: false},
  {id:'corso', label:'Corso', hex:'#3498DB', autoText: 'Corso', isAdd: false},
  {id:'stipendio', label:'Stipendio 💰', hex:'none', autoText: 'Stipendio 💰', isAdd: true}
];

const darkBgColors = ['#E74C3C', '#566573', '#3498DB'];
const lightBgColors = ['#D6EAF8', '#F5CBA7', '#ffffff'];
const MONTHS = ['GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO','LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'];
const DAYS = ['LUN','MAR','MER','GIO','VEN','SAB','DOM'];

let currentYear = new Date().getFullYear();
let selectedKeys = []; let isSelecting = false; let tempBulkColor = null; let tempBulkText = "";

function pushToCloud() { if(auth.currentUser) dbRef.set(db); }

// ===============================================
// FUNZIONI PREMIUM: STATS, STIPENDIO, METEO, CONDIVIDI
// ===============================================

function showStats() {
  const now = new Date();
  const m = now.getMonth() + 1; // Mese corrente
  const y = now.getFullYear();
  let stats = { MATTINA: 0, POMERIGGIO: 0, SMART: 0, SEDE: 0, FERIE: 0 };
  let giorniLavoroEffettivi = 0;
  let oreMaggiorazione = 0;
  
  const daysInMonth = new Date(y, m, 0).getDate();

  for (let d = 1; d <= daysInMonth; d++) {
     const dow = new Date(y, m-1, d).getDay();
     if (dow === 0 || dow === 6) continue; // Esclude weekend

     const kTop = `${y}-${m}-${d}-top`;
     const kBot = `${y}-${m}-${d}-bottom`;
     
     let topColor = db[kTop]?.color || 'none';
     let botColor = db[kBot]?.color || 'none';
     let text = (db[kBot]?.text || "").toLowerCase();

     if (topColor === 'none') {
         const autoHex = getAutoColor(y, m, d);
         topColor = autoHex === '#D6EAF8' ? 'mattina' : 'pomeriggio';
     }

     let isFerie = (botColor === 'ferie' || text.includes('ferie') || topColor === 'ferie');
     let isFestivita = (botColor === 'festivita' || text.includes('festivita') || topColor === 'festivita');

     if (topColor === 'mattina') stats.MATTINA++;
     if (topColor === 'pomeriggio') stats.POMERIGGIO++;

     if (isFerie) {
         stats.FERIE++;
     } else if (botColor === 'smart' || text.includes('smart')) {
         stats.SMART++;
     } else if (botColor === 'none' || botColor === 'vuoto' || !botColor) {
         stats.SEDE++; // Task Bianco = In Sede
     }
     
     // Calcolo Stipendio
     if (!isFerie && !isFestivita) {
         giorniLavoroEffettivi++;
         if (topColor === 'mattina') oreMaggiorazione += 1.5;
         if (topColor === 'pomeriggio') oreMaggiorazione += 1.0;
     }
  }

  const stipendioBase = 3745.20;
  const indennitaTurno = giorniLavoroEffettivi * 8.07692;
  const maggiorazioneTurno = oreMaggiorazione * 8.01595;
  const totaleLordo = stipendioBase + indennitaTurno + maggiorazioneTurno - 180.00;
  const tasse = totaleLordo * 0.375;
  const stipendioNetto = totaleLordo - tasse;

  document.getElementById('statsContent').innerHTML = `
    <div style="display:flex; justify-content:space-between;"><span>☀️ Mattine:</span> <b>${stats.MATTINA}</b></div>
    <div style="display:flex; justify-content:space-between;"><span>🌙 Pomeriggi:</span> <b>${stats.POMERIGGIO}</b></div>
    <div style="display:flex; justify-content:space-between; color:var(--primary);"><span>🏢 In Sede:</span> <b>${stats.SEDE}</b></div>
    <div style="display:flex; justify-content:space-between; color:#E74C3C;"><span>🏠 Smart:</span> <b>${stats.SMART}</b></div>
    <div style="display:flex; justify-content:space-between; color:gray;"><span>🏖️ Ferie:</span> <b>${stats.FERIE}</b></div>
    <hr style="border:0; border-top:1px solid var(--border-color); margin: 10px 0;">
    <div style="text-align:center;">
        💰 <b>Previsione Stipendio Mese:</b><br>
        <span style="font-size:11px; color:gray;">Base: 3745,20€ | Ind: +${indennitaTurno.toFixed(2)}€ | Magg: +${maggiorazioneTurno.toFixed(2)}€</span><br>
        <span style="font-size:26px; font-weight:700; color:#27AE60;">€ ${stipendioNetto.toFixed(2).replace('.', ',')}</span>
    </div>
  `;
  document.getElementById('statsOverlay').classList.add('active');
}

function shareWeek() {
  let msg = "📅 *I miei turni della settimana*:\n\n";
  const today = new Date();
  const dayOfWeek = today.getDay() === 0 ? 7 : today.getDay();
  const start = new Date(today);
  start.setDate(today.getDate() - dayOfWeek + 1);

  const giorniNome = ["Lun", "Mar", "Mer", "Gio", "Ven"];
  
  for(let i=0; i<5; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const kTop = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}-top`;
    const kBot = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}-bottom`;
    
    let topColor = db[kTop]?.color || 'none';
    let botColor = db[kBot]?.color || 'none';
    let text = (db[kBot]?.text || "").toLowerCase();
    
    if (topColor === 'none') {
        const autoHex = getAutoColor(d.getFullYear(), d.getMonth()+1, d.getDate());
        topColor = autoHex === '#D6EAF8' ? 'MATTINA' : 'POMERIGGIO';
    } else {
        topColor = topColor.toUpperCase();
    }

    let luogo = "IN SEDE";
    if (botColor === 'smart' || text.includes('smart')) luogo = "SMART WORKING";
    if (botColor === 'ferie' || text.includes('ferie')) luogo = "FERIE";

    msg += `🔹 ${giorniNome[i]} ${d.getDate()}/${d.getMonth()+1}: *${topColor}* (${luogo})\n`;
  }
  window.open(`whatsapp://send?text=${encodeURIComponent(msg)}`);
}

function showWeather() {
  document.getElementById('statsOverlay').classList.remove('active'); // Chiude riepilogo
  const modal = document.getElementById('weatherOverlay');
  const content = document.getElementById('weatherContent');
  modal.classList.add('active');
  content.innerHTML = "<em>📍 Ricerca posizione in corso...</em>";

  if ("geolocation" in navigator) {
    navigator.geolocation.getCurrentPosition(async (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      try {
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`);
        const data = await res.json();
        
        let html = "";
        const giorni = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
        for(let i=0; i<5; i++) {
           const code = data.daily.weathercode[i];
           const maxT = Math.round(data.daily.temperature_2m_max[i]);
           const minT = Math.round(data.daily.temperature_2m_min[i]);
           let icon = "☀️";
           if(code === 1 || code === 2) icon = "⛅";
           else if(code === 3) icon = "☁️";
           else if(code >= 45 && code <= 48) icon = "🌫️";
           else if(code >= 51 && code <= 67) icon = "🌧️";
           else if(code >= 71 && code <= 77) icon = "❄️";
           else if(code >= 80 && code <= 82) icon = "🌦️";
           else if(code >= 95) icon = "⛈️";

           const d = new Date(data.daily.time[i]);
           const dayName = i === 0 ? "Oggi" : i === 1 ? "Domani" : giorni[d.getDay()];

           html += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border-color); padding:10px 0;">
             <span style="width:70px;"><b>${dayName}</b></span>
             <span style="font-size:20px;">${icon}</span>
             <span style="width:80px; text-align:right;">${minT}° / ${maxT}°</span>
           </div>`;
        }
        content.innerHTML = html;
      } catch(e) { content.innerHTML = "<em>❌ Errore meteo.</em>"; }
    }, (error) => { content.innerHTML = "<em>⚠️ Permesso posizione negato.</em>"; });
  } else { content.innerHTML = "<em>Geolocalizzazione non supportata.</em>"; }
}

// ===============================================
// FUNZIONI ORIGINALI E GRIGLIA
// ===============================================

function setupPointerEvents() {
    const grid = document.getElementById('calGrid');
    const getCell = (x, y) => document.elementFromPoint(x, y)?.closest('.cell:not(.empty)');
    grid.onpointerdown = (e) => {
        const cell = getCell(e.clientX, e.clientY); if (!cell) return;
        isSelecting = true; selectedKeys = [cell.dataset.key];
        grid.setPointerCapture(e.pointerId); cell.classList.add('selected');
    };
    grid.onpointermove = (e) => {
        if (!isSelecting) return;
        const cell = getCell(e.clientX, e.clientY);
        if (cell && !selectedKeys.includes(cell.dataset.key)) { selectedKeys.push(cell.dataset.key); cell.classList.add('selected'); }
    };
    grid.onpointerup = (e) => {
        if (!isSelecting) return; isSelecting = false;
        grid.releasePointerCapture(e.pointerId); openBulkEdit();
    };
}

function openBulkEdit() {
  if(selectedKeys.length === 1) { const data = db[selectedKeys[0]] || {}; tempBulkColor = data.color || 'none'; tempBulkText = data.text || ""; }
  else { tempBulkColor = null; tempBulkText = ""; }
  document.getElementById('modalText').value = tempBulkText; renderColors();
  document.getElementById('modal').classList.add('active');
}

function renderColors() {
  document.getElementById('colorGrid').innerHTML = COLORS.map(c => {
    let bgStyle = c.hex === 'none' ? 'var(--card-bg)' : c.hex;
    let textCol = (c.hex === 'none') ? 'var(--text-main)' : (darkBgColors.includes(c.hex) ? '#ffffff' : '#111827');
    const border = tempBulkColor===c.id ? '2px solid var(--primary)' : '1px solid var(--border-color)';
    return `<div class="color-opt" style="background:${bgStyle}; border:${border}; color:${textCol}" onclick="selectBulkColor('${c.id}', event)">${c.label}</div>`;
  }).join('');
}

function selectBulkColor(id, event) {
  event.stopPropagation(); const colorObj = COLORS.find(c => c.id === id);
  if (!colorObj.isAdd) tempBulkColor = id;
  if (id === 'none') { tempBulkText = ''; document.getElementById('modalText').value = ''; }
  else if (colorObj.autoText) { tempBulkText = colorObj.isAdd ? (tempBulkText ? tempBulkText + "\n" + colorObj.autoText : colorObj.autoText) : colorObj.autoText; document.getElementById('modalText').value = tempBulkText; }
  renderColors();
}

function saveAndCloseModal() {
  tempBulkText = document.getElementById('modalText').value.trim();
  selectedKeys.forEach(k => { db[k] = { color: tempBulkColor || (db[k]?.color || 'none'), text: tempBulkText }; if(db[k].color === 'none' && db[k].text === '') delete db[k]; });
  pushToCloud(); document.getElementById('modal').classList.remove('active');
  document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected')); selectedKeys = [];
}

function cancelModal() { document.getElementById('modal').classList.remove('active'); document.querySelectorAll('.cell.selected').forEach(c => c.classList.remove('selected')); selectedKeys = []; }

const REF_DATE = new Date(2027, 0, 4);
function getAutoColor(y, m, d) {
  const dt = new Date(y, m-1, d); const dow = dt.getDay() === 0 ? 6 : dt.getDay() - 1;
  const mon = new Date(dt); mon.setDate(dt.getDate() - dow);
  const wk = Math.round((mon - REF_DATE) / (1000*60*60*24*7));
  return wk % 2 === 0 ? '#D6EAF8' : '#F5CBA7';
}

function render() {
  const grid = document.getElementById('calGrid'); grid.innerHTML = '';
  const today = new Date(); const ty = today.getFullYear(), tm = today.getMonth(), td = today.getDate();
  for(let m=1; m<=12; m++) {
    const daysInM = new Date(currentYear, m, 0).getDate();
    const offset = new Date(currentYear, m-1, 1).getDay() === 0 ? 6 : new Date(currentYear, m-1, 1).getDay() - 1;
    let h = `<div class="month-block" id="m-${currentYear}-${m}">
      <div class="month-header">${MONTHS[m-1]} ${currentYear}</div>
      <div class="days-header">${DAYS.map(d => `<div class="day-name">${d}</div>`).join('')}</div>`;
    let d = 1 - offset;
    while(d <= daysInM) {
      h += `<div class="week-row">`;
      for(let i=0; i<7; i++) {
        let cd = d + i; if(cd > 0 && cd <= daysInM) {
          const k = `${currentYear}-${m}-${cd}-top`; const isT = currentYear===ty && (m-1)===tm && cd===td;
          const user = db[k] || {}; let bgStyle = user.color && user.color!=='none' ? (COLORS.find(c=>c.id===user.color)?.hex || 'none') : 'none';
          let isWeekend = false;
          if(bgStyle === 'none') { const dow = new Date(currentYear, m-1, cd).getDay(); if (dow===0 || dow===6) { bgStyle = 'var(--weekend-bg)'; isWeekend = true; } else { bgStyle = getAutoColor(currentYear, m, cd); } }
          let textCol = (darkBgColors.includes(bgStyle)) ? '#ffffff' : (lightBgColors.includes(bgStyle) ? '#111827' : (isWeekend ? 'var(--weekend-text)' : 'var(--default-text)'));
          h += `<div class="cell day-cell ${isT?'today-ring':''}" style="background:${bgStyle}; color:${textCol}" data-key="${k}"><span class="day-num">${cd}</span></div>`;
        } else h += `<div class="cell empty"></div>`;
      }
      h += `</div><div class="note-row">`;
      for(let i=0; i<7; i++) {
        let cd = d + i; if(cd > 0 && cd <= daysInM) {
          const k = `${currentYear}-${m}-${cd}-bottom`; const user = db[k] || {};
          let bgStyle = user.color && user.color!=='none' ? (COLORS.find(c=>c.id===user.color)?.hex || 'none') : 'none';
          let isWeekend = false;
          if (bgStyle === 'none') { const dow = new Date(currentYear, m-1, cd).getDay(); if (dow===0 || dow===6) { bgStyle = 'var(--weekend-bg)'; isWeekend = true; } else { bgStyle = 'var(--default-cell-bg)'; } }
          let textCol = (darkBgColors.includes(bgStyle)) ? '#ffffff' : (lightBgColors.includes(bgStyle) ? '#111827' : (isWeekend ? 'var(--weekend-text)' : 'var(--default-text)'));
          const htmlTasks = (user.text||'').split('\n').filter(l => l.trim() !== '').map(l => `<div style="margin-bottom:3px; display:flex; gap:4px;"><span>•</span><span style="flex:1;">${l}</span></div>`).join('');
          h += `<div class="cell note-cell" style="background:${bgStyle}; color:${textCol}" data-key="${k}">${htmlTasks}</div>`;
        } else h += `<div class="cell empty"></div>`;
      }
      h += `</div>`; d += 7;
    }
    grid.innerHTML += h + `</div>`;
  }
}

const s = document.getElementById('yearSel');
for(let y=2024; y<=2080; y++) { let o=document.createElement('option'); o.value=y; o.textContent=y; s.appendChild(o); }
s.value = currentYear; s.onchange = () => { currentYear = +s.value; render(); };

function scrollToToday() {
  const t = new Date(); currentYear = t.getFullYear(); s.value = currentYear; render();
  setTimeout(() => { 
    const target = document.getElementById(`m-${currentYear}-${t.getMonth()+1}`);
    if(target) { const offset = target.getBoundingClientRect().top + window.pageYOffset - 80; window.scrollTo({ top: offset, behavior: 'smooth' }); }
  }, 250);
}
</script>
