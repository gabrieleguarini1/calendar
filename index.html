<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calendario Cloud Sincronizzato</title>

<link rel="icon" href="https://png.pngtree.com/png-clipart/20240629/original/pngtree-google-calendar-calendar-icon-vector-png-image_15443322.png" type="image/png">

<link rel="apple-touch-icon" href="https://png.pngtree.com/png-clipart/20240629/original/pngtree-google-calendar-calendar-icon-vector-png-image_15443322.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calendario">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0; touch-action: manipulation;}
  body{font-family:Arial, sans-serif;background:#f4f4f4;color:#333;padding:1rem; -webkit-text-size-adjust: 100%;}
  h1{font-size:18px;margin-bottom:1rem;text-align:center}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1rem;background:#fff;padding:10px;border-radius:8px;position:sticky;top:0;z-index:10}
  select, button{height:34px;padding:0 10px;border-radius:6px;border:1px solid #ccc;cursor:pointer;font-size:13px;}
  button.undo-btn{background:#f39c12;color:#fff;border:none;display:none}
  .cal-grid{display:flex;flex-direction:column;gap:20px;align-items:center}
  .month-block{background:#fff;width:100%;max-width:900px;border:2px solid #333;border-radius:4px;overflow:hidden; scroll-margin-top: 60px;}
  .month-header{padding:8px;background:#fff;border-bottom:1px solid #333;font-weight:bold;text-align:center}
  .days-header{display:grid;grid-template-columns:repeat(7, 1fr);background:#538135}
  .day-name{text-align:center;font-size:10px;font-weight:bold;color:#fff;padding:6px 0}
  .week-row, .note-row { display:grid; grid-template-columns:repeat(7, 1fr); }
  
  .cell { 
    border-right: 1px solid #bbb; 
    height: 50px; 
    cursor: pointer; 
    overflow: hidden; 
    padding: 2px;
  }
  .cell:last-child { border-right: none; }
  .cell.empty { background: #fafafa!important; cursor: default; }
  
  .day-cell { 
    border-bottom: 1px solid #eee; 
    display: flex;
    align-items: center; 
    justify-content: center;
    position: relative; 
  }
  .day-num { font-weight: bold; font-size: 13px; }

  .note-cell { 
    border-bottom: 1px solid #333; 
    background: #fff; 
    font-size: 9px; 
    text-align: center;
    line-height: 1.1;
  }
  
  .today-ring { outline: 3px solid #000; outline-offset: -3px; z-index: 2; }
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal{background:#fff;border-radius:8px;padding:15px;width:320px;max-width:90vw;}
  textarea{width:100%;height:70px;margin:8px 0;padding:8px;border-radius:4px;border:1px solid #ccc;resize:none;font-size:16px !important;}
  .color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
  .color-opt{height:35px;border-radius:4px;cursor:pointer;border:1px solid #ccc;display:flex;align-items:center;justify-content:center;text-align:center;font-size:8px;font-weight:bold;padding:2px;}
  .color-opt.selected{border:2px solid #000}
</style>
</head>
<body>

<h1>Calendario Cloud 2024–2080</h1>

<div class="toolbar">
  <select id="yearSel"></select>
  <button onclick="scrollToToday()">📅 Oggi</button>
  <button onclick="location.reload()">🔄 Aggiorna</button>
  <button id="undoBtn" class="undo-btn" onclick="undo()">↩ Annulla</button>
  <span id="syncStatus" style="font-size:11px; color:#538135; margin-left:10px">☁️ Connessione...</span>
</div>

<div id="legend" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:1rem;"></div>
<div class="cal-grid" id="calGrid"></div>

<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal">
    <h4 id="modalTitle" style="margin-bottom:8px"></h4>
    <div class="color-grid" id="colorGrid"></div>
    <textarea id="modalText" placeholder="Scrivi qui..." oninput="autoSaveText()"></textarea>
    <button style="width:100%; background:#eee; padding:8px; border-radius:4px; border:1px solid #ccc" onclick="closeModal()">Chiudi</button>
  </div>
</div>

<script>
// --- CONFIGURAZIONE FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyDeFEGyaHbvTB5GmQwvZ3LCRHEXliWPlE8",
  authDomain: "calendariosmart-4ae27.firebaseapp.com",
  projectId: "calendariosmart-4ae27",
  storageBucket: "calendariosmart-4ae27.firebasestorage.app",
  messagingSenderId: "1027818141525",
  appId: "1:1027818141525:web:b409cbe6c524d532a1a1dc",
  databaseURL: "https://calendariosmart-4ae27-default-rtdb.europe-west1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const COLORS = [
  {id:'none', label:'Bianco', hex:'#ffffff', autoText: '', isAdd: false},
  {id:'mattina', label:'Mattina', hex:'#BDD7EE', autoText: '', isAdd: false},
  {id:'pomeriggio', label:'Pom.', hex:'#FFA500', autoText: '', isAdd: false},
  {id:'smart', label:'Smart', hex:'#e74c3c', autoText: '', isAdd: false},
  {id:'ferie', label:'Ferie', hex:'#2c3e50', autoText: '', isAdd: false},
  {id:'treno1', label:'Treno 8.52', hex:'#ffffff', autoText: 'Treno 8.52', isAdd: false},
  {id:'treno2', label:'Treno 15.05', hex:'#ffffff', autoText: 'Treno 15.05', isAdd: false},
  {id:'allatto', label:'Allatto', hex:'#8e44ad', autoText: '🟣', isAdd: true},
  {id:'festivita', label:'Festività', hex:'#bdc3c7', autoText: '', isAdd: false}
];

const MONTHS = ['GENNAIO','FEBBRAIO','MARZO','APRILE','MAGGIO','GIUGNO','LUGLIO','AGOSTO','SETTEMBRE','OTTOBRE','NOVEMBRE','DICEMBRE'];
const DAYS = ['LUN','MAR','MER','GIO','VEN','SAB','DOM'];

let db = {}; 
let history = []; 
let currentYear = new Date().getFullYear();
let activeKey = null;
let activeColor = 'none';

database.ref('calendario_dati').on('value', (snapshot) => {
  db = snapshot.val() || {};
  render();
  document.getElementById('syncStatus').textContent = '☁️ Sincronizzato';
});

function pushToCloud() {
  database.ref('calendario_dati').set(db);
  document.getElementById('syncStatus').textContent = '☁️ Salvataggio...';
}

function pushHistory() {
  history.push(JSON.stringify(db));
  if(history.length > 10) history.shift();
  document.getElementById('undoBtn').style.display = 'inline-block';
}

function undo() {
  if(history.length > 0) {
    db = JSON.parse(history.pop());
    if(history.length === 0) document.getElementById('undoBtn').style.display = 'none';
    pushToCloud();
  }
}

const REF_DATE = new Date(2027, 0, 4);
function getAutoColor(y, m, d) {
  const dt = new Date(y, m-1, d);
  const dow = dt.getDay() === 0 ? 6 : dt.getDay() - 1;
  const mon = new Date(dt); mon.setDate(dt.getDate() - dow);
  const wk = Math.round((mon - REF_DATE) / (1000*60*60*24*7));
  return wk % 2 === 0 ? '#BDD7EE' : '#FFA500';
}

function render() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const today = new Date();
  const ty = today.getFullYear(), tm = today.getMonth()+1, td = today.getDate();

  for(let m=1; m<=12; m++) {
    const daysInM = new Date(currentYear, m, 0).getDate();
    const firstD = new Date(currentYear, m-1, 1).getDay();
    const offset = firstD === 0 ? 6 : firstD - 1;

    let h = `<div class="month-block" id="m-${currentYear}-${m}">
      <div class="month-header">${MONTHS[m-1]} ${currentYear}</div>
      <div class="days-header">${DAYS.map(d => `<div class="day-name">${d}</div>`).join('')}</div>`;

    let d = 1 - offset;
    while(d <= daysInM) {
      h += `<div class="week-row">`;
      for(let i=0; i<7; i++) {
        let cd = d + i;
        if(cd > 0 && cd <= daysInM) {
          const k = `${currentYear}-${m}-${cd}-top`;
          const isToday = currentYear===ty && m===tm && cd===td;
          const user = db[k] || {};
          let bg = user.color && user.color!=='none' ? COLORS.find(c=>c.id===user.color).hex : '';
          if(!bg) {
            const dow = new Date(currentYear, m-1, cd).getDay();
            bg = (dow===0 || dow===6) ? '#F2F2F2' : getAutoColor(currentYear, m, cd);
          }
          h += `<div class="cell day-cell ${isToday?'today-ring':''}" style="background:${bg}" onclick="openEdit('${k}',${cd},${m})">
            <span class="day-num">${cd}</span>${(user.text||'').replace(/\n/g,'<br>')}</div>`;
        } else h += `<div class="cell empty"></div>`;
      }
      h += `</div><div class="note-row">`;
      for(let i=0; i<7; i++) {
        let cd = d + i;
        if(cd > 0 && cd <= daysInM) {
          const k = `${currentYear}-${m}-${cd}-bottom`;
          const user = db[k] || {};
          const bg = user.color && user.color!=='none' ? COLORS.find(c=>c.id===user.color).hex : '#ffffff';
          h += `<div class="cell note-cell" style="background:${bg}" onclick="openEdit('${k}',${cd},${m})">${(user.text||'').replace(/\n/g,'<br>')}</div>`;
        } else h += `<div class="cell empty"></div>`;
      }
      h += `</div>`;
      d += 7;
    }
    grid.innerHTML += h + `</div>`;
  }
}

function openEdit(k, d, m) {
  activeKey = k;
  const user = db[k] || {};
  activeColor = user.color || 'none';
  document.getElementById('modalTitle').textContent = `${d} ${MONTHS[m-1]}`;
  document.getElementById('modalText').value = user.text || '';
  renderColors();
  document.getElementById('modal').style.display = 'flex';
}

function renderColors() {
  document.getElementById('colorGrid').innerHTML = COLORS.map(c => `
    <div class="color-opt ${activeColor===c.id?'selected':''}" style="background:${c.hex}" onclick="selectColor('${c.id}')">
        <span style="color:${c.id==='allatto' || c.id==='ferie' ? '#fff' : '#333'}">${c.label}</span>
    </div>
  `).join('');
}

function selectColor(id) {
  const colorObj = COLORS.find(c => c.id === id);
  let currentText = document.getElementById('modalText').value.trim();
  
  if (colorObj.autoText !== '') {
      if (colorObj.isAdd) {
          currentText = currentText ? currentText + ' ' + colorObj.autoText : colorObj.autoText;
      } else {
          currentText = colorObj.autoText;
      }
      document.getElementById('modalText').value = currentText;
  }

  if (!colorObj.isAdd) activeColor = id;

  if(currentText || activeColor!=='none') db[activeKey] = {color: activeColor, text: currentText};
  else delete db[activeKey];
  
  pushToCloud();
  if (!colorObj.isAdd) closeModal();
}

function autoSaveText() {
  const txt = document.getElementById('modalText').value.trim();
  if(txt || activeColor!=='none') db[activeKey] = {color: activeColor, text: txt};
  else delete db[activeKey];
  pushToCloud();
}

function closeModal() { document.getElementById('modal').style.display = 'none'; render(); }

const s = document.getElementById('yearSel');
for(let y=2024; y<=2080; y++) { let o=document.createElement('option'); o.value=y; o.textContent=y; s.appendChild(o); }
s.value = currentYear;
s.onchange = () => { currentYear = +s.value; render(); };

document.getElementById('legend').innerHTML = COLORS.filter(c=>c.id!=='none').map(c=>`
  <div style="display:flex; align-items:center; gap:4px; font-size:10px; background:#fff; padding:2px 6px; border:1px solid #ddd; border-radius:4px;">
    <div style="width:10px; height:10px; background:${c.hex}; border-radius:2px;"></div>
    <span>${c.label}</span>
  </div>
`).join('');

function scrollToToday() {
  const t = new Date();
  currentYear = t.getFullYear(); 
  s.value = currentYear; 
  render();
  setTimeout(() => { 
    const target = document.getElementById(`m-${currentYear}-${t.getMonth()+1}`);
    if(target) {
        target.scrollIntoView({behavior:'smooth', block:'start'});
    }
  }, 250);
}
window.onload = scrollToToday;
</script>
</body>
</html>
